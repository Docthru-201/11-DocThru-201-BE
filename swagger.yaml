openapi: 3.0.3
info:
  title: DocThru API
  version: 1.0.0
  description: |
    DocThru 백엔드 API 명세 초안
    - 현재 확정된 Prisma 스키마 기준

servers:
  - url: http://localhost:5001/api

tags:
  - name: Challenges
  - name: Works
  - name: Applications
  - name: Comments
  - name: Likes
  - name: Notifications
  - name: Users
  - name: Profile
  - name: Auth
  - name: Admin

paths:
  /admin/management:
    get:
      tags: [Admin]
      summary: 챌린지 관리 목록 조회 (승인 대기 챌린지 등)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/ChallengeStatus'
      responses:
        '200':
          description: 관리 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/management/{challengeId}:
    get:
      tags: [Admin]
      summary: 특정 챌린지 신청 목록 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChallengeIdParam'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: 해당 챌린지 신청 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/management/{applicationId}:
    patch:
      tags: [Admin]
      summary: 신청 승인/거절 (Application 상태 변경)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ApplicationIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplicationRequest'
      responses:
        '200':
          description: 신청 상태 변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /applications/{applicationId}:
    get:
      tags: [Applications]
      summary: 특정 참가 신청 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ApplicationIdParam'
      responses:
        '200':
          description: 참가 신청 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /auth/signup:
    post:
      tags: [Auth]
      summary: 회원가입
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: 현재 기기 로그아웃
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 로그아웃 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnlyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout/all:
    post:
      tags: [Auth]
      summary: 모든 기기 로그아웃
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 모든 기기 로그아웃 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnlyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: access token 재발급
      responses:
        '200':
          description: 토큰 재발급 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/{provider}/login:
    get:
      tags: [Auth]
      summary: OAuth 로그인 시작
      parameters:
        - $ref: '#/components/parameters/ProviderParam'
      responses:
        '302':
          description: OAuth 제공자 로그인 페이지로 리다이렉트
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/{provider}/callback:
    get:
      tags: [Auth]
      summary: OAuth 인증 처리
      parameters:
        - $ref: '#/components/parameters/ProviderParam'
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OAuth 인증 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '302':
          description: 프론트 페이지로 리다이렉트
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me:
    get:
      tags: [Users]
      summary: 내 기본 정보 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 내 정보 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags: [Users]
      summary: 내 기본 정보 수정
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: 내 정보 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

    delete:
      tags: [Users]
      summary: 회원 탈퇴
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 회원 탈퇴 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnlyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{userId}:
    get:
      tags: [Users]
      summary: 특정 유저 기본 정보 조회
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: 특정 유저 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/me/profile:
    get:
      tags: [Profile]
      summary: 내 확장 정보 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 내 프로필 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Profile]
      summary: 내 확장 정보 수정
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: 내 프로필 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{userId}/profile:
    get:
      tags: [Profile]
      summary: 특정 유저 확장 정보 조회
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: 특정 유저 프로필 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /challenges:
    get:
      tags: [Challenges]
      summary: 전체 챌린지 목록 조회
      parameters:
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/ChallengeStatus'
        - in: query
          name: category
          schema:
            $ref: '#/components/schemas/Category'
        - in: query
          name: type
          schema:
            $ref: '#/components/schemas/Type'
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: sort
          schema:
            type: string
            example: latest
      responses:
        '200':
          description: 챌린지 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

    post:
      tags: [Challenges]
      summary: 새 챌린지 생성
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChallengeRequest'
      responses:
        '201':
          description: 챌린지 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /challenges/me:
    get:
      tags: [Challenges]
      summary: 내가 신청한 챌린지 목록 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/ApplicationStatus'
      responses:
        '200':
          description: 내가 신청한 챌린지 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /challenges/{challengeId}:
    get:
      tags: [Challenges]
      summary: 특정 챌린지 상세 조회
      parameters:
        - $ref: '#/components/parameters/ChallengeIdParam'
      responses:
        '200':
          description: 챌린지 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Challenges]
      summary: 특정 챌린지 정보 수정
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChallengeIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChallengeRequest'
      responses:
        '200':
          description: 챌린지 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

    delete:
      tags: [Challenges]
      summary: 특정 챌린지 삭제
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChallengeIdParam'
      responses:
        '200':
          description: 챌린지 삭제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnlyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/me/challenges:
    get:
      tags: [Challenges]
      summary: 내가 만든 챌린지 목록 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/ChallengeStatus'
      responses:
        '200':
          description: 내가 만든 챌린지 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /challenges/me/{challengeId}:
    get:
      tags: [Challenges]
      summary: 내가 신청한 특정 챌린지 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChallengeIdParam'
      responses:
        '200':
          description: 내가 신청한 챌린지 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Challenges]
      summary: 챌린지 신청 취소 (삭제 대신 상태 변경)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChallengeIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplicationRequest'
      responses:
        '200':
          description: 신청 취소 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /challenges/{challengeId}/participants:
    get:
      tags: [Challenges]
      summary: 참가자 목록 조회
      parameters:
        - $ref: '#/components/parameters/ChallengeIdParam'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: 참가자 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /challenges/{challengeId}/applications:
    post:
      tags: [Applications]
      summary: 챌린지 신청
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChallengeIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequest'
      responses:
        '201':
          description: 챌린지 신청 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /works:
    get:
      tags: [Works]
      summary: 작업물 목록 조회
      parameters:
        - in: query
          name: challengeId
          required: false
          schema:
            type: string
            description: 특정 챌린지의 작업물만 조회할 때 사용
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - in: query
          name: sort
          schema:
            type: string
            example: latest
      responses:
        '200':
          description: 작업물 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkListResponse'

    post:
      tags: [Works]
      summary: 작업물 등록
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkRequest'
      responses:
        '201':
          description: 작업물 등록 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /works/{workId}:
    get:
      tags: [Works]
      summary: 작업물 상세 조회
      parameters:
        - $ref: '#/components/parameters/WorkIdParam'
      responses:
        '200':
          description: 작업물 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Works]
      summary: 작업물 수정
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkRequest'
      responses:
        '200':
          description: 작업물 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Works]
      summary: 작업물 삭제
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkIdParam'
      responses:
        '200':
          description: 작업물 삭제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnlyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /works/{workId}/comments:
    get:
      tags: [Comments]
      summary: 댓글 목록 조회
      parameters:
        - $ref: '#/components/parameters/WorkIdParam'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: 댓글 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Comments]
      summary: 댓글 또는 대댓글 작성
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: 댓글 작성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /comments/{commentId}:
    patch:
      tags: [Comments]
      summary: 댓글 수정
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CommentIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: 댓글 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentDetailResponse'
        '400':
